<!-- parcels.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parcels - Parcel Dashboard</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Administrator</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="parcels.html" class="active">Parcels</a>
        <a href="users.html">Users</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h1>Parcel Management</h1>
        <button class="toggle-btn" id="toggleTheme" aria-pressed="false" title="Toggle theme">☀️ Light Mode</button>
      </header>

      <!-- Parcels Table -->
      <section class="parcel-table">
        <h2>All Parcels</h2>
        <table>
          <thead>
            <tr>
              <th>Parcel ID</th>
              <th>Recipient</th>
              <th>Status</th>
              <th>Arrival Date</th>
              <th>Collected Date</th>
            </tr>
          </thead>
          <tbody id="parcels-tbody">
            <!-- Rows will be injected here -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Firebase Config and Script -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjP_ZvkY1cwCmPE738KMGYOohZJt4py3c",
      authDomain: "parcel-pin-system.firebaseapp.com",
      projectId: "parcel-pin-system",
      storageBucket: "parcel-pin-system.firebasestorage.app",
      messagingSenderId: "444891168630",
      appId: "1:444891168630:web:7dacb5087988c6325ac457"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadParcels() {
      const tbody = document.getElementById("parcels-tbody");
      tbody.innerHTML = "";

      try {
        const snapshot = await db.collection("parcel_info").get();
        snapshot.forEach(doc => {
          const data = doc.data();

          const parcelId = data.parcel_id || "-";
          const name = data.name || "-";
          const status = data.status || "Pending";
          const arrival = data.arrival_date?.toDate().toISOString().split("T")[0] || "-";
          const collected = data.retrieval_date ? data.retrieval_date.toDate().toISOString().split("T")[0] : "-";

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${parcelId}</td>
            <td>${name}</td>
            <td><span class="status ${status.toLowerCase()}">${status}</span></td>
            <td>${arrival}</td>
            <td>${collected}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error("Error loading parcels:", error);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadParcels();

      const toggleBtn = document.getElementById("toggleTheme");

      const setBtnLabel = () => {
        const light = document.body.classList.contains("light");
        toggleBtn.textContent = light ? "🌙 Dark Mode" : "☀️ Light Mode";
        toggleBtn.setAttribute("aria-pressed", String(!light));
      };

      // Restore saved theme
      const saved = localStorage.getItem("theme");
      if (saved === "light") document.body.classList.add("light");
      setBtnLabel();

      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("light");
        localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
        setBtnLabel();
      });
    });
  </script>
</body>
</html>
